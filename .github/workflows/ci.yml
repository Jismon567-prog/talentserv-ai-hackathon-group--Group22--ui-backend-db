name: CI

on:
  push:
    branches: [main, openmrs-test-case-gen]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit & meta-tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci_placeholder
          CLERK_SECRET_KEY: sk_test_ci_placeholder
          OPENAI_API_KEY: sk-test-ci-placeholder

  playwright-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright skeleton deps
        working-directory: automation/playwright
        run: npm install

      - name: Install Chromium
        working-directory: automation/playwright
        run: npx playwright install chromium --with-deps

      - name: Run automation skeleton smoke tests
        working-directory: automation/playwright
        run: npm test
